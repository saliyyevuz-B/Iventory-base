{% extends 'base.html' %}
{% block content %}

<div class="d-flex justify-content-between align-items-center mb-4">
    <h5 class="fw-bold mb-0 text-danger">⚠️ Kam qolgan mahsulotlar</h5>
    <a href="{% url 'product_list' %}" class="btn btn-outline-secondary rounded-3">← Orqaga</a>
</div>

<div class="card border-0 shadow-sm rounded-4">
    <div class="card-body p-0">
        <table class="table table-hover mb-0">
            <thead class="table-light">
                <tr>
                    <th>Nomi</th>
                    <th>SKU</th>
                    <th>Qoldiq</th>
                    <th>Minimal</th>
                    <th>Supplier</th>
                </tr>
            </thead>
            <tbody>
                {% for p in products %}
                <tr class="table-danger">
                    <td class="fw-semibold">{{ p.name }}</td>
                    <td><span class="badge bg-secondary">{{ p.sku }}</span></td>
                    <td><span class="badge bg-danger">{{ p.stock }}</span></td>
                    <td>{{ p.min_stock }}</td>
                    <td>{{ p.supplier.name|default:"-" }}</td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="5" class="text-center text-muted py-4">✅ Barcha mahsulotlar yetarli</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

{% endblock %}
